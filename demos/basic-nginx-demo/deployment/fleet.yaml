apiVersion: v1alpha1
kind: Fleet
metadata:
  name: basic-nginx-fleet
spec:
  selector:
    matchLabels:
      fleet: basic-nginx-fleet
  template:
    spec:
      os:
        image: quay.io/flightctl/flightctl-agent-basic-nginx:latest
      config:
        - name: motd-update
          configType: InlineConfigProviderSpec
          inline:
            - path: "/etc/motd"
              content: "This system is managed by flightctl."
              mode: 0644
        - name: microshift-manifests
          configType: GitConfigProviderSpec
          gitRef:  
            repository: basic-nginx-demo
            targetRevision: simple-demo-sept-23
            path: /demos/basic-nginx-demo/configuration
      systemd:
        matchPatterns:
          - "microshift.service"
          - "crio.service"
          - "api-server@.service"
          - "sshd-test.service"
